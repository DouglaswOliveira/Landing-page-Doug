<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Douglas Oliveira | IRPF 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff; --secondary: #6e00ff; --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--dark-bg); color: #fff; line-height: 1.6; text-align: center; }
        header { padding: 80px 20px; background: radial-gradient(circle at 50% -20%, var(--secondary), transparent 50%); }
        .perfil-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--primary); margin-bottom: 20px; object-fit: cover; }
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px 20px; }
        .card { background: var(--glass); border: 1px solid var(--border); padding: 30px; border-radius: 20px; width: 300px; backdrop-filter: blur(10px); }
        .price { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin: 15px 0; }
        .form-section { max-width: 500px; margin: 50px auto; padding: 40px; background: var(--glass); border-radius: 30px; border: 1px solid var(--border); }
        input, select, button { width: 100%; padding: 15px; margin-top: 15px; border-radius: 10px; border: 1px solid var(--border); }
        input { background: #000; color: #fff; }
        button { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #fff; font-weight: 800; cursor: pointer; border: none; }
        footer { padding: 40px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <img src="static/images/sua_foto.jpg" alt="Douglas Oliveira" class="perfil-img">
    <h1>Douglas Oliveira</h1>
    <p>Especialista em Imposto de Renda 2026</p>
</header>

<section class="card-container">
    <div class="card">
        <h3>Simples</h3>
        <div class="price">R$ 45</div>
        <p>Salários e Aposentadorias</p>
    </div>
    <div class="card" style="border-color: var(--primary);">
        <h3>Completa</h3>
        <div class="price">R$ 100</div>
        <p>Investidores e Bens</p>
    </div>
    <div class="card">
        <h3>MEI</h3>
        <div class="price">R$ 150</div>
        <p>DASN-SIMEI + IRPF</p>
    </div>
</section>

<div class="form-section">
    <h2>Solicitar Informações</h2>
    <form id="irpfForm">
        <input type="text" id="nome" value="Douglas Wesley Alves de Oliveira" readonly>
        <input type="text" id="whatsapp" value="17982073231" readonly>
        <select id="plano">
            <option value="Simples">Declaração Simples</option>
            <option value="Completa">Declaração Completa</option>
            <option value="MEI">Declaração MEI</option>
        </select>
        <button type="submit"><i class="fa-brands fa-whatsapp"></i> ENVIAR PARA O WHATSAPP</button>
    </form>
</div>

<footer>
    <p>&copy; 2026 Douglas Oliveira | São José do Rio Preto - SP</p>
</footer>

<script>
    document.getElementById('irpfForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Dados que você solicitou
        const nome = "Douglas Wesley Alves de Oliveira";
        const whatsCliente = "17982073231";
        const plano = document.getElementById('plano').value;
        const meuWhats = "5517982073231"; // Seu número para receber a mensagem

        // Montagem da mensagem com quebras de linha (%0A)
        const mensagem = `Olá Douglas, quero fazer minha declaração de Imposto de Renda 2026.%0A%0A` +
                         `*Nome:* ${nome}%0A` +
                         `*WhatsApp do cliente:* ${whatsCliente}%0A` +
                         `*Serviço:* ${plano}%0A%0A` +
                         `Gostaria de receber mais informações.`;

        const link = `https://wa.me/${meuWhats}?text=${mensagem}`;
        window.open(link, '_blank');
    });
</script>

</body>
</html>
